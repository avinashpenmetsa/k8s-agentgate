image:
  repository: avin4sh/k8-agentgate
  tag: "0.5.0"
  pullPolicy: IfNotPresent

# Client + server cert validity before auto-rotation
certTTL: "6h"

service:
  type: ClusterIP    # or NodePort
  port: 8443
  nodePort: ""       # e.g. 30443, used when type=NodePort

tls:
  # First extraDNSName is used as hostname in kubeconfig URL (NodePort/Ingress/Istio modes).
  # All entries are added to the server cert SANs.
  extraDNSNames: []
  extraIPAddresses: []    # e.g. ["192.168.1.10"]

# Standard k8s Ingress (requires ssl-passthrough support, e.g. nginx ingress)
ingress:
  enabled: false
  className: "nginx"
  hostname: ""        # e.g. "k8-agentgate.example.com"
  port: 443
  annotations:
    nginx.ingress.kubernetes.io/ssl-passthrough: "true"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"

# Istio Gateway + VirtualService (TLS passthrough mode)
istio:
  enabled: true
  gatewayName: ""          # leave empty to create a new Gateway
  gatewaySelector:
    istio: ingressgateway
  hostname: k8-agentgate.example.com
  port: 443

# Namespace-scoped RBAC (no ClusterRoles — list namespaces and their allowed rules)
rbac:
  namespaces:
    - default
  rules:
    # Pods: list, get, watch
    - apiGroups: [""]
      resources: ["pods"]
      verbs: ["get", "list", "watch"]
    # Pod exec
    - apiGroups: [""]
      resources: ["pods/exec"]
      verbs: ["create"]
    # Pod logs
    - apiGroups: [""]
      resources: ["pods/log"]
      verbs: ["get"]
    # Pod port-forward
    - apiGroups: [""]
      resources: ["pods/portforward"]
      verbs: ["create"]
    # Deployments: list, get, set image (patch), scale
    - apiGroups: ["apps"]
      resources: ["deployments"]
      verbs: ["get", "list", "patch"]
    - apiGroups: ["apps"]
      resources: ["deployments/scale"]
      verbs: ["get", "patch"]

securityContext:
  readOnlyRootFilesystem: true    # emptyDir is still writable
  allowPrivilegeEscalation: false
  runAsNonRoot: true
  runAsUser: 65534
