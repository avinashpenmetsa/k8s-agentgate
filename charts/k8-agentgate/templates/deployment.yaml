{{- $serverURL := printf "https://127.0.0.1:%d" (int .Values.service.port) }}
{{- if and (eq .Values.service.type "NodePort") .Values.service.nodePort .Values.tls.extraDNSNames }}
  {{- $serverURL = printf "https://%s:%d" (index .Values.tls.extraDNSNames 0) (int .Values.service.nodePort) }}
{{- end }}
{{- if and .Values.ingress.enabled .Values.ingress.hostname }}
  {{- $serverURL = printf "https://%s:%d" .Values.ingress.hostname (int .Values.ingress.port) }}
{{- end }}
{{- if and .Values.istio.enabled .Values.istio.hostname }}
  {{- $serverURL = printf "https://%s:%d" .Values.istio.hostname (int .Values.istio.port) }}
{{- end }}
{{- /* Build deduplicated DNS names list: merge extraDNSNames + ingress/istio hostnames */ -}}
{{- $dnsNames := .Values.tls.extraDNSNames | default list }}
{{- if and .Values.ingress.enabled .Values.ingress.hostname }}
  {{- if not (has .Values.ingress.hostname $dnsNames) }}
    {{- $dnsNames = append $dnsNames .Values.ingress.hostname }}
  {{- end }}
{{- end }}
{{- if and .Values.istio.enabled .Values.istio.hostname }}
  {{- if not (has .Values.istio.hostname $dnsNames) }}
    {{- $dnsNames = append $dnsNames .Values.istio.hostname }}
  {{- end }}
{{- end }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "k8-agentgate.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "k8-agentgate.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "k8-agentgate.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "k8-agentgate.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "k8-agentgate.fullname" . }}
      containers:
        - name: k8-agentgate
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: https
              containerPort: 8443
              protocol: TCP
          env:
            - name: CERT_TTL
              value: {{ .Values.certTTL | quote }}
            - name: AGENTGATE_DATA_DIR
              value: "/var/agentgate"
            - name: PROXY_SERVER_URL
              value: {{ $serverURL | quote }}
            - name: TLS_SERVICE_NAME
              value: {{ include "k8-agentgate.fullname" . | quote }}
            - name: TLS_SERVICE_FQDN
              value: "{{ include "k8-agentgate.fullname" . }}.{{ .Release.Namespace }}.svc.cluster.local"
            - name: TLS_EXTRA_DNS_NAMES
              value: {{ $dnsNames | join "," | quote }}
            - name: TLS_EXTRA_IPS
              value: {{ .Values.tls.extraIPAddresses | join "," | quote }}
          volumeMounts:
            - name: agentgate-data
              mountPath: /var/agentgate
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          readinessProbe:
            tcpSocket:
              port: 8443
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 8443
            initialDelaySeconds: 15
            periodSeconds: 20
      volumes:
        - name: agentgate-data
          emptyDir: {}
