{{- range .Values.rbac.namespaces }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "k8-agentgate.fullname" $ }}
  namespace: {{ . }}
  labels:
    {{- include "k8-agentgate.labels" $ | nindent 4 }}
rules:
  {{- toYaml $.Values.rbac.rules | nindent 2 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "k8-agentgate.fullname" $ }}
  namespace: {{ . }}
  labels:
    {{- include "k8-agentgate.labels" $ | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "k8-agentgate.fullname" $ }}
subjects:
  - kind: ServiceAccount
    name: {{ include "k8-agentgate.fullname" $ }}
    namespace: {{ $.Release.Namespace }}
{{- end }}
